name: Dependency Audit Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 13 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce pnpm-only lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json detected. This repository is pnpm-only."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run audit and collect JSON
        run: |
          pnpm audit --json > audit.json || true

      - name: Fail on high/critical vulnerabilities
        run: |
          node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('audit.json','utf8')); const v=(report.metadata&&report.metadata.vulnerabilities)||{}; const high=v.high||0; const critical=v.critical||0; console.log('high=',high,'critical=',critical); if(high>0||critical>0){process.exit(1);}"
